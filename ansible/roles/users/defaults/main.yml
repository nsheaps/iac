---
# User configuration mapping
# Maps actual system usernames to configuration profiles
# Example:
# user_configs:
#   - system_user: nheaps        # Actual username on the system
#     config_profile: nsheaps     # Configuration profile to apply
#     email: nheaps@company.com   # Override email (optional)
#     full_name: "Nathan H"       # Override full name (optional)
#   - system_user: nsheaps
#     config_profile: nsheaps
#     email: nsheaps@gmail.com
user_configs: []

# Default shell for users
default_user_shell: /bin/bash

# Default groups for regular users
default_user_groups:
  - sudo
  - docker

# Configuration profile defaults
# These define the default values for each configuration profile
#
# Inheritance Support:
# Profiles can inherit from other profiles using the 'inherits_from' field.
# Child profiles merge with parent profiles, with child values taking precedence.
# Lists are extended (parent + child), dictionaries are merged recursively.
#
# Example inheritance:
# config_profiles:
#   base_user:
#     shell: /bin/bash
#     groups: [users]
#     configs: [bash, git]
#
#   developer:
#     inherits_from: base_user
#     groups: [docker, sudo]  # Final: [users, docker, sudo]
#     configs: [ssh, tmux]    # Final: [bash, git, ssh, tmux]
#
config_profiles:
  nsheaps:
    full_name: 'Nathan Heaps'
    email: nsheaps@gmail.com
    shell: /bin/zsh
    groups:
      - sudo
      - docker
      - adm
      - cdrom
      - dip
      - plugdev
      - lpadmin
    configs:
      - bash
      - git
      - htop
      - inputrc
      - mc
      - ssh
      - tmux
      - vim
      - zsh

  nheaps:
    inherits_from: nsheaps
    full_name: 'Nathan Heaps'
    email: nheaps@gather.town

  root:
    full_name: 'root'
    email: root@localhost
    shell: /bin/bash
    groups: []
    configs:
      - bash
      - tmux
      - vim
      - zsh

  example_user:
    full_name: 'Example User'
    email: user@example.com
    shell: /bin/bash
    groups:
      - sudo
      - docker
    configs:
      - all # Include all configs from example_user directory
