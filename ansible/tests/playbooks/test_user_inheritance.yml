---
# Test playbook for verifying user inheritance system
- name: Test User Inheritance Resolution
  hosts: localhost
  connection: local
  gather_facts: no
  vars_files:
    - ../../roles/users/defaults/main.yml
  
  tasks:
    - name: Display raw config profiles
      debug:
        msg: "Raw profiles: {{ config_profiles }}"
      tags: [raw]

    - name: Test inheritance resolution
      debug:
        msg: "Resolved profiles: {{ config_profiles | resolve_user_inheritance }}"
      tags: [resolved]

    - name: Verify nheaps inherits from nsheaps
      vars:
        resolved: "{{ config_profiles | resolve_user_inheritance }}"
      assert:
        that:
          - resolved.nheaps.email == "nheaps@gather.town"
          - resolved.nheaps.full_name == "Nathan Heaps"
          - resolved.nheaps.shell == "/bin/zsh"
          - "'vim' in resolved.nheaps.configs"
          - "'tmux' in resolved.nheaps.configs"
        fail_msg: "nheaps profile did not properly inherit from nsheaps"
        success_msg: "nheaps successfully inherits from nsheaps with email override"
      tags: [verify]