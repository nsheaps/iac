name: pulumi-preview

on:
  pull_request:
    paths:
      - 'github-org/**'
      - '.github/workflows/pulumi-*.yaml'
      - 'bin/pulumi-wrapper.sh'

concurrency:
  group: pulumi-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  preview:
    name: Pulumi Preview
    if: ${{ false }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@6
      - uses: pulumi/actions@v6
        with:
          command: preview
          stack-name: prod
          work-dir: github-org
          comment-on-pr: true
          comment-on-summary: true
        env:
          GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
          PULUMI_CONFIG_PASSPHRASE: ${{ env.PULUMI_CONFIG_PASSPHRASE }}
          # Uses file:// backend by default. When R2 credentials are set,
          # set PULUMI_BACKEND_URL to switch to R2 automatically.
          # PULUMI_BACKEND_URL: s3://nsheaps-pulumi-state?endpoint=...
