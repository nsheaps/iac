name: arcane-deploy

on:
  push:
    branches: [main]
    paths:
      - "hosts/heapsnas/**"
      - ".github/workflows/arcane-deploy.yaml"

concurrency:
  group: arcane-deploy
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Arcane
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Load secrets from 1Password
        id: secrets
        uses: 1password/load-secrets-action@v3
        env:
          OP_SERVICE_ACCOUNT_TOKEN: ${{ secrets.OP_SERVICE_TOKEN }}
          ARCANE_URL: op://heapsinfra/arcane/url
          ARCANE_API_KEY: op://heapsinfra/arcane/api-key
          ARCANE_ENVIRONMENT_ID: op://heapsinfra/arcane/environment-id
          GIT_TOKEN: op://heapsinfra/gha--github--n8agent-pat/credential

      - uses: actions/checkout@v4

      - name: Deploy heapsnas stacks
        # TODO: Pin to commit SHA once nsheaps/github-actions has releases.
        #       See: https://github.com/nsheaps/iac/issues/3
        uses: nsheaps/github-actions/.github/actions/arcane-deploy@main
        with:
          arcane-url: ${{ env.ARCANE_URL }}
          arcane-api-key: ${{ env.ARCANE_API_KEY }}
          environment-id: ${{ env.ARCANE_ENVIRONMENT_ID }}
          compose-dir: hosts/heapsnas
          sync-name-prefix: heapsnas
          auth-type: http
          git-token: ${{ env.GIT_TOKEN }}
          branch: main
