name: check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  # for main we want to build all sha's, but for PRs we want the same group. On main if they share the same group, even if
  # cancel-in-progress=false, if there's a queued build and another push happens, the queued build will be cancelled.
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || ( github.ref == 'refs/heads/main' && github.sha  || github.ref ) }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        id: checkout
        uses: nsheaps/github-actions/.github/actions/checkout-as-app@main
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Setup corepack/yarn
        run: corepack enable && corepack install

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # do not use built in corepack or cache flags
          node-version-file: .nvmrc

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run checks
        id: check
        run: yarn run check:ci
        continue-on-error: true

      - name: Auto-fix issues
        if: steps.check.outcome == 'failure'
        run: |
          echo "Checks failed, attempting to auto-fix..."
          yarn run check:fix

      - name: Commit and push auto-fixes
        if: steps.check.outcome == 'failure' && ! cancelled()
        id: auto-commit-action
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: `yarn run check:fix`'

      - name: Exit with failure if checks failed
        if: steps.check.outcome == 'failure' && ! cancelled()
        run: |
          echo "Checks failed! Auto-committed fixes, but more issues may remain."
          exit 1
