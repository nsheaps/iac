name: check

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Authenticate as GitHub App
        id: auth
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.AUTOMATION_GITHUB_APP_ID }}
          private-key: ${{ secrets.AUTOMATION_GITHUB_APP_PRIVATE_KEY }}

      - name: Configure git credentials
        env:
          GH_TOKEN: ${{ steps.auth.outputs.token }}
        run: |
          gh auth setup-git
          echo "GH_TOKEN=${GH_TOKEN}" >> "$GITHUB_ENV"
          echo "GITHUB_TOKEN=${GH_TOKEN}" >> "$GITHUB_ENV"

      - name: Re-checkout with app token
        uses: actions/checkout@v6
        with:
          token: ${{ steps.auth.outputs.token }}
          clean: false
          persist-credentials: true

      - name: Setup corepack/yarn
        run: corepack enable && corepack install

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          # do not use built in corepack or cache flags
          node-version-file: .nvmrc

      - name: Install dependencies
        run: yarn install --immutable

      - name: Run checks
        id: check
        run: yarn run check:ci
        continue-on-error: true

      - name: Auto-fix issues
        if: steps.check.outcome == 'failure'
        run: |
          echo "Checks failed, attempting to auto-fix..."
          yarn run check:fix

      - name: Commit and push auto-fixes
        if: steps.check.outcome == 'failure' && ! cancelled()
        id: auto-commit-action
        uses: stefanzweifel/git-auto-commit-action@v7
        with:
          commit_message: 'chore: auto-fix formatting and linting'

      - name: Exit with failure if checks failed
        if: steps.check.outcome == 'failure' && ! cancelled()
        run: |
          echo "Checks failed! Auto-committed fixes, but more issues may remain."
          exit 1
